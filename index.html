<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Moja Strona</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; }
        nav { background-color: #333; padding: 10px; position: sticky; top: 0; }
        nav a { color: white; text-decoration: none; margin-right: 20px; font-size: 18px; }
        nav a:hover { text-decoration: underline; }
        section { padding: 40px; }
        #onas { background: #f2f2f2; }
    </style>
</head>
<body>

    <nav>
        <a href="#start">Strona Główna</a>
        <a href="#onas">O nas</a>
    </nav>

    <section id="start">
        <h1>Strona Główna</h1>
        <p>Witamy na naszej stronie! Tutaj możesz wpisać dowolną treść.</p>
    </section>

    <section id="onas">
        <h1>O nas</h1>
        <p>Tu wpisz informacje o sobie, firmie, sklepie lub działalności.</p>
    </section>

</body>
</html>
